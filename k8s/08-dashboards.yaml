##############################################################################
# 08-dashboards.yaml — Dev/staging tools only.
# Do NOT expose these in production without VPN or IP allowlist on the Ingress.
##############################################################################

# ─── pgAdmin ──────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgadmin
  namespace: inventory
  labels:
    app: pgadmin
    role: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
        role: dashboard
    spec:
      securityContext:
        runAsNonRoot: false  # pgAdmin requires root to bind port 80 internally
        fsGroup: 5050        # pgAdmin image default GID
      containers:
        - name: pgadmin
          image: dpage/pgadmin4:8.5   # Pinned — do not use :latest in production
          ports:
            - containerPort: 80
              name: http
          env:
            - name: PGADMIN_DEFAULT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: inventory-app-secret
                  key: PGADMIN_EMAIL
            - name: PGADMIN_DEFAULT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-app-secret
                  key: PGADMIN_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /misc/ping
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: pgadmin
  namespace: inventory
  labels:
    app: pgadmin
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: pgadmin
---
# ─── RedisInsight ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redisinsight
  namespace: inventory
  labels:
    app: redisinsight
    role: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redisinsight
  template:
    metadata:
      labels:
        app: redisinsight
        role: dashboard
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: redisinsight
          image: redis/redisinsight:2.50   # Pinned — do not use :latest
          ports:
            - containerPort: 5540
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: redisinsight
  namespace: inventory
  labels:
    app: redisinsight
spec:
  type: ClusterIP
  ports:
    - port: 5540
      targetPort: 5540
      name: http
  selector:
    app: redisinsight
