apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: inventory
  labels:
    app: postgres
spec:
  serviceName: "postgres"
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 999    # postgres user inside the official image
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: inventory-app-secret
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-app-secret
                  key: DB_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: inventory-app-secret
                  key: DB_DATABASE
            # Store WAL files in the same volume to avoid data loss on crash
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # readinessProbe: only route traffic when Postgres is accepting connections
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          # livenessProbe: restart if Postgres stops responding completely
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Postgres writes to its data dir
            seccompProfile:
              type: RuntimeDefault
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
# Headless service: required for StatefulSet DNS (postgres-0.postgres.inventory.svc)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: inventory
  labels:
    app: postgres
spec:
  clusterIP: None     # headless — lets StatefulSet pods get stable DNS names
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: postgres
