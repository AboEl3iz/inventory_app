apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: inventory
  labels:
    app: redis
spec:
  serviceName: "redis"
  replicas: 1
  podManagementPolicy: OrderedReady
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 999    # redis user inside the official image
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          # ─── Password auth ─────────────────────────────────────────────────
          # REDIS_PASSWORD is injected from the Secret below.
          # The app's BullMQ config also reads REDIS_PASSWORD from the same Secret.
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --appendonly
            - "yes"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-app-secret
                  key: REDIS_PASSWORD
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # readinessProbe: confirm Redis is accepting authenticated connections
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          # livenessProbe: restart if Redis stops responding
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Redis writes AOF/RDB to /data
            seccompProfile:
              type: RuntimeDefault
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
# Headless service for StatefulSet DNS stability
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: inventory
  labels:
    app: redis
spec:
  clusterIP: None   # headless
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: redis
