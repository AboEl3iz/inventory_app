# =============================================================================
# Jenkins Configuration as Code (JCasC)
# File: jenkins/casc/jenkins.yaml
#
# All secrets are injected via environment variables set in docker-compose.
# SONAR_TOKEN is read from the shared volume by jenkins-init.sh and exported.
# =============================================================================

jenkins:
  systemMessage: |
    🚀 DevSecOps CI/CD Pipeline — Jenkins
    Configured via JCasC | Managed automatically — do NOT edit manually.

  # ── Security ───────────────────────────────────────────────────────────
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: admin
          name: "Admin"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  # ── Agents ────────────────────────────────────────────────────────────
  numExecutors: 4
  mode: NORMAL
  labelString: ""

  # ── Global Tool Configuration ─────────────────────────────────────────
tool:
  nodejs:
    installations:
      - name: NodeJS-20
        properties:
          - installSource:
              installers:
                - nodeJSInstaller:
                    id: "20.19.0"
                    npmPackagesRefreshHours: 72

# ── SonarQube Server ──────────────────────────────────────────────────────
unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: sonarqube
        serverUrl: "${SONARQUBE_URL}"
        credentialsId: sonar-token

  # ── Slack Notifier ─────────────────────────────────────────────────────
  slackNotifier:
    teamDomain: ""          # Not needed when using webhook URL directly
    tokenCredentialId: ""   # Webhook is passed per-call in Jenkinsfile
    room: "#deployments"

  # ── Git global config ─────────────────────────────────────────────────
  gitHubPluginConfig:
    hookUrl: "http://jenkins:8080/github-webhook/"

# ── Credentials ──────────────────────────────────────────────────────────
credentials:
  system:
    domainCredentials:
      - credentials:

          # DockerHub username + password/token
          - usernamePassword:
              id: dockerhub-credentials
              scope: GLOBAL
              description: "DockerHub — push images"
              username: "${DOCKERHUB_USERNAME}"
              password: "${DOCKERHUB_PASSWORD}"

          # GitHub PAT — checkout app repo + push gitops repo
          - usernamePassword:
              id: github-credentials
              scope: GLOBAL
              description: "GitHub PAT — repo read/write"
              username: "${GITHUB_USERNAME}"
              password: "${GITHUB_TOKEN}"

          # SonarQube analysis token (auto-generated by sonar-init)
          - string:
              id: sonar-token
              scope: GLOBAL
              description: "SonarQube CI token (auto-generated)"
              secret: "${SONAR_TOKEN}"

          # Slack webhook URL
          - string:
              id: slack-webhook-url
              scope: GLOBAL
              description: "Slack Incoming Webhook URL"
              secret: "${SLACK_WEBHOOK_URL}"

# ── Seed Job — creates the pipeline via Job DSL ──────────────────────────
jobs:
  - script: |
      pipelineJob('inventory-app-ci') {
        displayName('Inventory App — CI Pipeline')
        description('DevSecOps pipeline: Test → SAST → Build → Scan → Push → GitOps')

        properties {
          buildDiscarder {
            strategy {
              logRotator {
                numToKeepStr('10')
                artifactNumToKeepStr('5')
              }
            }
          }
        }

        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('https://github.com/YOUR_ORG/inventory_app.git')
                  credentials('github-credentials')
                }
                branches('*/main')
              }
            }
            scriptPath('Jenkinsfile')
            lightweight(true)
          }
        }

        triggers {
          githubPush()
        }
      }
