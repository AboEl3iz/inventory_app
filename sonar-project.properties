# =============================================================================
# SonarQube Project Configuration — Inventory App (NestJS/TypeScript)
# =============================================================================

sonar.projectKey=inventory-app
sonar.projectName=Inventory App
sonar.projectVersion=1.0

# ── Sources ──────────────────────────────────────────────────────────────
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts,**/*.e2e-spec.ts

# ── Exclusions ───────────────────────────────────────────────────────────
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.js,\
  **/migrations/**,\
  **/seeds/**,\
  **/*.d.ts

sonar.coverage.exclusions=\
  **/*.module.ts,\
  **/main.ts,\
  **/*.dto.ts,\
  **/*.entity.ts,\
  **/*.interface.ts,\
  **/migrations/**

# ── TypeScript ───────────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=tsconfig.json

# ── Coverage (generated by jest --coverage) ───────────────────────────────
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# ── Encoding ─────────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Quality Gate ─────────────────────────────────────────────────────────
# Pipeline aborts if Quality Gate fails (configured in jenkins/casc/jenkins.yaml)

# ── SAST Rules ───────────────────────────────────────────────────────────
# Sonar will pick up security hotspots for:
# - Injection flaws (SQL, command, path traversal)
# - Hardcoded credentials
# - Insecure configurations
# - Weak cryptography
