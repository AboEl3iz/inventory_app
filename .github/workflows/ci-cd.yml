# ============================================
# CI/CD Pipeline — Lint → Security → Test → Build → Push
# ============================================
# Required GitHub Secrets:
#   DOCKERHUB_USERNAME  - Docker Hub username
#   DOCKERHUB_TOKEN     - Docker Hub access token (not your password)
#
# Flow:
#   • Every push / PR → lint + security + test
#   • Push to master only → build & push Docker image
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

# ─── Limit permissions to principle of least privilege ───────────────────────
permissions:
  contents: read
  packages: write # needed to push to GHCR if ever switched from DockerHub
  security-events: write #

# ─── Cancel redundant runs on the same branch/PR ────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/inventory-app

# ─── Shared test environment variables ──────────────────────────────────────
# Defined once here, referenced in each test step via ${{ env.* }}
# to avoid duplication and drift between steps.
defaults:
  run:
    shell: bash

jobs:
  # ─── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

