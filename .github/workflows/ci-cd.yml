  # ─── Build & Push Docker Image ─────────────────────────────────────────────
  docker:
    name: Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    # Only deploy on pushes to master — not on PRs
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # QEMU enables multi-arch builds (amd64 + arm64 for mixed node clusters)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            # Git SHA tag for traceability (e.g. sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Semantic version tag when you push a git tag like v1.2.3
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # latest always points to the most recent master build
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Build for both amd64 (standard servers) and arm64 (Apple M1, ARM nodes)
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
